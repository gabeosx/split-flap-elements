name: Feature request
description: Propose a focused improvement to the public Web Component API or demos.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Describe the board or interaction you are trying to build.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behavior
      description: Include a small HTML or JavaScript example when possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note any existing API or CSS approach you tried.
