name: Bug report
description: Report a reproducible problem with the package or demos.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a problem.
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit, or live demo URL.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the smallest HTML and JavaScript that demonstrates the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
    validations:
      required: true
