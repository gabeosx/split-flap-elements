name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run validate

  pull-request-title:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE=$(gh pr list --head "$GITHUB_REF_NAME" --state open --json title --jq '.[0].title // ""')
          fi
          export PR_TITLE
          node -e 'const title = process.env.PR_TITLE ?? ""; const pattern = /^(feat|fix|perf|refactor|docs|test|build|ci|chore)(\([^)]+\))?!?: .+/; if (!pattern.test(title)) { console.error("Use a Conventional Commit pull-request title."); process.exit(1); }'
