name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run validate

  pull-request-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate Conventional Commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          node -e 'const title = process.env.PR_TITLE ?? ""; const pattern = /^(feat|fix|perf|refactor|docs|test|build|ci|chore)(\([^)]+\))?!?: .+/; if (!pattern.test(title)) { console.error("Use a Conventional Commit pull-request title."); process.exit(1); }'
